name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Prepare release assets
        shell: pwsh
        run: |
          $assetRoot = Join-Path $env:RUNNER_TEMP "flget-release"
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\prepare-release-assets.ps1 -OutputPath $assetRoot

      - name: Publish GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $assetRoot = Join-Path $env:RUNNER_TEMP "flget-release"
          $tag = if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME) {
            $env:GITHUB_REF_NAME
          } else {
            throw "workflow_dispatch requires a tag ref. Run this workflow from an existing release tag."
          }
          $assets = Get-ChildItem -LiteralPath $assetRoot -File | ForEach-Object { $_.FullName }

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag @assets --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag @assets --title $tag --generate-notes --repo $env:GITHUB_REPOSITORY
          }
