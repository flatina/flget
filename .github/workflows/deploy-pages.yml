name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'github-pages/**'
      - 'scripts/prepare-pages.ps1'
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build
        shell: pwsh
        run: bun run build

      - name: Prepare Pages site
        shell: pwsh
        run: |
          $publishRoot = Join-Path $env:RUNNER_TEMP "flget-pages"
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\prepare-pages.ps1 -OutputPath $publishRoot

      - name: Download Bun runtimes for Pages
        shell: pwsh
        run: |
          $downloadsDir = Join-Path $env:RUNNER_TEMP "flget-pages\downloads"
          foreach ($entry in @(
            @{ Url = "https://github.com/oven-sh/bun/releases/latest/download/bun-windows-x64.zip"; Name = "bun.exe" },
            @{ Url = "https://github.com/oven-sh/bun/releases/latest/download/bun-windows-aarch64.zip"; Name = "bun-arm64.exe" }
          )) {
            $zipPath = Join-Path $downloadsDir "bun-tmp.zip"
            $extractDir = Join-Path $downloadsDir "bun-extract"
            Invoke-WebRequest -Uri $entry.Url -OutFile $zipPath
            Expand-Archive -LiteralPath $zipPath -DestinationPath $extractDir -Force
            $bunExe = Get-ChildItem -Path $extractDir -Filter "bun.exe" -Recurse | Select-Object -First 1
            Copy-Item $bunExe.FullName (Join-Path $downloadsDir $entry.Name)
            Remove-Item $zipPath, $extractDir -Recurse -Force
          }

      - name: Publish gh-pages branch
        shell: pwsh
        run: |
          $publishRoot = Join-Path $env:RUNNER_TEMP "flget-pages"
          $worktree = Join-Path $env:RUNNER_TEMP "flget-gh-pages"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if (Test-Path -LiteralPath $worktree) {
            Remove-Item -LiteralPath $worktree -Recurse -Force
          }

          git worktree add -B gh-pages $worktree

          try {
            Get-ChildItem -LiteralPath $worktree -Force |
              Where-Object { $_.Name -ne ".git" } |
              Remove-Item -Recurse -Force

            Get-ChildItem -LiteralPath $publishRoot -Force |
              ForEach-Object {
                Copy-Item -LiteralPath $_.FullName -Destination $worktree -Recurse -Force
              }

            Push-Location $worktree
            try {
              git add --all
              $hasChanges = git status --short
              if (-not $hasChanges) {
                Write-Host "No Pages changes to publish."
              } else {
                git commit -m "Deploy GitHub Pages"
                git push --force origin HEAD:gh-pages
              }
            } finally {
              Pop-Location
            }
          } finally {
            git worktree remove $worktree --force
          }
